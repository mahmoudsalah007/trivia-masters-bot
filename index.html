<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trivia Masters</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --gold2: #FFA500;
  --dark: #0a0a1a;
  --dark2: #12122a;
  --dark3: #1a1a3e;
  --purple: #6c3ce1;
  --purple2: #9b59b6;
  --green: #00e676;
  --red: #ff1744;
  --blue: #00b0ff;
  --text: #ffffff;
  --text2: #b0b0d0;
  --card: rgba(255,255,255,0.05);
  --card2: rgba(255,255,255,0.1);
  --radius: 20px;
  --radius2: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* Background particles */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(108,60,225,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(255,165,0,0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(0,176,255,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  overflow-y: auto;
  padding: 20px;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ===== LOADING SCREEN ===== */
#loading {
  background: var(--dark);
  z-index: 100;
}

.loading-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loading-sub {
  color: var(--gold2);
  font-size: 14px;
  letter-spacing: 3px;
  margin-bottom: 50px;
  text-transform: uppercase;
}

@keyframes pulse {
  0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  50% { text-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 100px rgba(255,165,0,0.5); }
}

.progress-bar-wrap {
  width: 260px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}

.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--purple), var(--gold));
  border-radius: 3px;
  transition: width 0.3s ease;
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.loading-text {
  color: var(--text2);
  font-size: 13px;
  letter-spacing: 1px;
}

.loading-stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle linear infinite;
}

@keyframes twinkle {
  0% { opacity: 0; transform: translateY(0); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* ===== HOME SCREEN ===== */
#home {
  padding: 0;
  justify-content: flex-start;
  overflow-y: auto;
}

.home-header {
  width: 100%;
  background: linear-gradient(180deg, var(--dark2) 0%, transparent 100%);
  padding: 20px 20px 30px;
  position: relative;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.game-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(255,215,0,0.4);
}

.coins-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
}

/* Player card */
.player-card {
  background: linear-gradient(135deg, var(--dark3), rgba(108,60,225,0.3));
  border: 1px solid rgba(108,60,225,0.3);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.player-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.player-name {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 4px;
}

.player-level {
  color: var(--gold);
  font-size: 14px;
  margin-bottom: 16px;
}

.xp-bar-wrap {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 6px;
}

.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--gold));
  border-radius: 10px;
  transition: width 1s ease;
  box-shadow: 0 0 8px rgba(255,215,0,0.4);
}

.xp-text {
  font-size: 12px;
  color: var(--text2);
  text-align: left;
  direction: ltr;
}

.player-stats-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.stat-item {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
}

.stat-value {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
}

.stat-label {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}

/* Daily reward banner */
.daily-banner {
  width: 100%;
  margin: 16px 0 0;
  background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,176,255,0.1));
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: var(--radius2);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s;
  padding: 20px;
}
.daily-banner:active { transform: scale(0.98); }

.daily-icon { font-size: 32px; }

.daily-info { flex: 1; }
.daily-title { font-size: 15px; font-weight: 700; color: var(--green); }
.daily-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.daily-arrow { color: var(--green); font-size: 20px; }

/* Nav tabs */
.nav-tabs {
  display: flex;
  width: 100%;
  background: var(--dark2);
  border-radius: 16px;
  padding: 4px;
  margin: 20px;
  gap: 2px;
}

.nav-tab {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 700;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--purple), var(--purple2));
  color: white;
  box-shadow: 0 4px 15px rgba(108,60,225,0.4);
}

.nav-tab-icon { font-size: 18px; }

/* Content sections */
.home-content {
  width: 100%;
  padding: 0 20px 100px;
}

.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}

/* Topic cards */
.topics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.topic-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}

.topic-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: var(--radius);
}

.topic-card:active { transform: scale(0.95); }
.topic-card:active::before { opacity: 1; }

.topic-card[data-topic="sports"]::before { background: linear-gradient(135deg, rgba(0,230,118,0.2), transparent); }
.topic-card[data-topic="movies"]::before { background: linear-gradient(135deg, rgba(255,64,129,0.2), transparent); }
.topic-card[data-topic="general"]::before { background: linear-gradient(135deg, rgba(0,176,255,0.2), transparent); }
.topic-card[data-topic="history"]::before { background: linear-gradient(135deg, rgba(255,167,38,0.2), transparent); }
.topic-card[data-topic="geography"]::before { background: linear-gradient(135deg, rgba(171,71,188,0.2), transparent); }

.topic-emoji { font-size: 36px; margin-bottom: 10px; display: block; }
.topic-name { font-size: 14px; font-weight: 700; }
.topic-count { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Mission card */
.mission-card {
  background: linear-gradient(135deg, rgba(255,167,38,0.1), rgba(255,64,129,0.05));
  border: 1px solid rgba(255,167,38,0.25);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 24px;
  cursor: pointer;
}

.mission-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.mission-title { font-size: 15px; font-weight: 700; }
.mission-reward { color: var(--gold); font-size: 14px; font-weight: 700; }

.mission-progress-bar {
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 6px;
}

.mission-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF6B35, #FFD700);
  border-radius: 6px;
  transition: width 0.5s ease;
}

.mission-status { font-size: 12px; color: var(--text2); }

/* Play button */
.play-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--purple), #9b59b6);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 30px rgba(108,60,225,0.4);
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.play-btn:active { transform: scale(0.97); box-shadow: 0 4px 15px rgba(108,60,225,0.3); }

/* ===== TOPIC SELECT SCREEN ===== */
#topic-select {
  justify-content: flex-start;
  padding: 0;
}

.screen-header {
  width: 100%;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(180deg, var(--dark2), transparent);
}

.back-btn {
  width: 40px;
  height: 40px;
  background: var(--card2);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.back-btn:active { transform: scale(0.9); }

.screen-title {
  font-size: 20px;
  font-weight: 900;
}

.topics-full-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  padding: 10px 20px 100px;
}

.topic-full-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 24px 16px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.topic-full-card:active { transform: scale(0.95); }

.topic-full-card[data-topic="sports"] { border-color: rgba(0,230,118,0.3); }
.topic-full-card[data-topic="movies"] { border-color: rgba(255,64,129,0.3); }
.topic-full-card[data-topic="general"] { border-color: rgba(0,176,255,0.3); }
.topic-full-card[data-topic="history"] { border-color: rgba(255,167,38,0.3); }
.topic-full-card[data-topic="geography"] { border-color: rgba(171,71,188,0.3); }

.topic-full-emoji { font-size: 48px; margin-bottom: 12px; display: block; }
.topic-full-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.topic-full-desc { font-size: 12px; color: var(--text2); }

/* ===== LEVEL SELECT SCREEN ===== */
#level-select {
  justify-content: flex-start;
  padding: 0;
}

.level-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  padding: 10px 20px 40px;
}

.level-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 18px;
}
.level-card:active { transform: scale(0.97); }

.level-card[data-level="easy"] { border-color: rgba(0,230,118,0.3); }
.level-card[data-level="medium"] { border-color: rgba(255,215,0,0.3); }
.level-card[data-level="hard"] { border-color: rgba(255,23,68,0.3); }

.level-icon { font-size: 40px; }
.level-info { flex: 1; }
.level-name { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.level-desc { font-size: 13px; color: var(--text2); }
.level-xp {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 20px;
}
.level-card[data-level="easy"] .level-xp { background: rgba(0,230,118,0.15); color: var(--green); }
.level-card[data-level="medium"] .level-xp { background: rgba(255,215,0,0.15); color: var(--gold); }
.level-card[data-level="hard"] .level-xp { background: rgba(255,23,68,0.15); color: var(--red); }

/* ===== GAME SCREEN ===== */
#game {
  justify-content: flex-start;
  padding: 0;
}

.game-topbar {
  width: 100%;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.question-counter {
  font-size: 14px;
  color: var(--text2);
  font-weight: 700;
}

.timer-wrap {
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}

.timer-bar {
  width: 100px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--gold));
  border-radius: 3px;
  transition: width 1s linear, background 1s linear;
}

.timer-count {
  font-size: 14px;
  font-weight: 900;
  color: var(--gold);
  min-width: 24px;
}

.score-badge {
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}

/* Question progress dots */
.q-dots {
  display: flex;
  gap: 6px;
  padding: 0 20px;
  margin-bottom: 16px;
  width: 100%;
  justify-content: center;
}

.q-dot {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  transition: all 0.3s;
}
.q-dot.done { background: var(--green); }
.q-dot.correct { background: var(--green); }
.q-dot.wrong { background: var(--red); }
.q-dot.active { background: var(--gold); }

/* Question card */
.question-card {
  width: 100%;
  padding: 0 20px;
  margin-bottom: 20px;
}

.topic-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(108,60,225,0.2);
  border: 1px solid rgba(108,60,225,0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--purple2);
  margin-bottom: 16px;
}

.question-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--text);
}

/* Answer options */
.answers-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  padding: 0 20px;
}

.answer-btn {
  width: 100%;
  padding: 16px 20px;
  background: var(--card);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius2);
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: right;
  display: flex;
  align-items: center;
  gap: 12px;
}

.answer-btn:active:not(.disabled) { transform: scale(0.98); }
.answer-btn.disabled { cursor: default; }

.answer-letter {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.2s;
}

.answer-btn.correct-ans {
  background: rgba(0,230,118,0.15);
  border-color: var(--green);
  animation: correctPulse 0.5s ease;
}
.answer-btn.correct-ans .answer-letter { background: var(--green); color: black; }

.answer-btn.wrong-ans {
  background: rgba(255,23,68,0.1);
  border-color: var(--red);
  animation: wrongShake 0.4s ease;
}
.answer-btn.wrong-ans .answer-letter { background: var(--red); }

.answer-btn.faded { opacity: 0.35; }

@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Powerups bar */
.powerups-bar {
  display: flex;
  gap: 10px;
  padding: 12px 20px 0;
  width: 100%;
}

.powerup-btn {
  flex: 1;
  padding: 10px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.powerup-btn:active { transform: scale(0.95); }
.powerup-btn.used { opacity: 0.4; pointer-events: none; }

.powerup-icon { font-size: 18px; }
.powerup-count {
  background: var(--purple);
  color: white;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== RESULT SCREEN ===== */
#result {
  background: var(--dark);
}

.result-content {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
}

.result-emoji {
  font-size: 80px;
  margin-bottom: 16px;
  animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
}

@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.result-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 6px;
  text-align: center;
}

.result-sub {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 30px;
  text-align: center;
}

.result-score-card {
  width: 100%;
  background: linear-gradient(135deg, var(--dark3), rgba(108,60,225,0.2));
  border: 1px solid rgba(108,60,225,0.3);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}

.score-main {
  text-align: center;
  margin-bottom: 20px;
}

.score-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 56px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
}

.score-total { font-size: 24px; color: var(--text2); }

.score-label { font-size: 14px; color: var(--text2); margin-top: 4px; }

.rewards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.reward-item {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.reward-value {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 4px;
}

.reward-value.xp { color: var(--purple2); }
.reward-value.coins { color: var(--gold); }

.reward-label { font-size: 12px; color: var(--text2); }

/* Achievements popup */
.achievement-popup {
  width: 100%;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,167,38,0.1));
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius2);
  padding: 16px;
  margin-bottom: 16px;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.achievement-popup-title {
  font-size: 13px;
  color: var(--gold2);
  margin-bottom: 8px;
  font-weight: 700;
}

.achievement-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}

.btn-primary {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--purple), #9b59b6);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 25px rgba(108,60,225,0.4);
}
.btn-primary:active { transform: scale(0.97); }
